<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Bushfire Risk Areas in Australia</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" 
          crossorigin=""/>
    <style>
        /* Make the map fill the entire screen */
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        
        /* Optional: Style for the popup */
        .leaflet-popup-content-wrapper {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Leaflet JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" 
            crossorigin=""></script>

    <script>
        // 1. Initialize the map
        // Coordinates for the approximate center of Australia
        const map = L.map('map').setView([-25.2744, 133.7751], 4);

        // 2. Add OpenStreetMap tile layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // 3. Define high bushfire risk areas
        const riskAreas = [
            { name: "Melbourne (Dandenong Ranges)", coords: [-37.8931, 145.3582], description: "High-risk interface with dense forests and extreme fire weather." },
            { name: "Sydney (Blue Mountains)", coords: [-33.7128, 150.3119], description: "Vulnerable to ember attacks and high forest fuel loads." },
            { name: "Adelaide Hills", coords: [-34.9984, 138.7188], description: "Steep, wooded terrain close to residential areas." },
            { name: "Perth Hills", coords: [-31.8974, 116.1667], description: "Hot inland winds and dry vegetation create significant risk." },
            { name: "Canberra (Western Edge)", coords: [-35.3411, 149.0347], description: "Known as the 'Bush Capital' with high integration of nature reserves." },
            { name: "Hobart (Mt Wellington Fringes)", coords: [-42.8947, 147.2373], description: "High fuel loads and suburban interface risks during heatwaves." }
        ];

        // 4. Add markers for each risk area
        riskAreas.forEach(area => {
            L.marker(area.coords)
                .addTo(map)
                .bindPopup(`<b>${area.name}</b><br>${area.description}`);
        });
    </script>
</body>
</html>

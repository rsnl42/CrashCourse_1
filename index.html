<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Map of Australia</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" 
          crossorigin=""/>
    <style>
        /* Make the map fill the entire screen */
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        
        /* Optional: Style for the popup */
        .leaflet-popup-content-wrapper {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- Leaflet JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" 
            crossorigin=""></script>

    <script>
        // 1. Initialize the map
        // Coordinates for the approximate center of Australia
        // Zoom level 4 is good for viewing the entire continent
        const map = L.map('map').setView([-25.2744, 133.7751], 4);

        // 2. Add OpenStreetMap tile layer (the actual map imagery)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // 3. Add a marker for Canberra (the capital)
        const canberraMarker = L.marker([-35.2809, 149.1300]).addTo(map);
        canberraMarker.bindPopup("<b>Canberra</b><br>Australia's Capital City").openPopup();

        // 4. (Optional) Add markers for other major cities
        const cities = [
            { name: "Sydney", coords: [-33.8688, 151.2093] },
            { name: "Melbourne", coords: [-37.8136, 144.9631] },
            { name: "Brisbane", coords: [-27.4705, 153.0260] },
            { name: "Perth", coords: [-31.9505, 115.8605] },
            { name: "Adelaide", coords: [-34.9285, 138.6007] }
        ];

        cities.forEach(city => {
            L.marker(city.coords).addTo(map).bindPopup(city.name);
        });
    </script>
</body>
</html>

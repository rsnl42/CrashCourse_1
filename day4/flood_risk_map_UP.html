<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Map - Uttar Pradesh</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { height: 100%; margin: 0; background: #f0f4f8; }
        #map { height: 100%; width: 100%; }
        
        .panel {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            background: rgba(255, 255, 255, 0.98); padding: 20px; border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 40, 133, 0.15); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            width: 300px; border: 1px solid #d1e3f8;
            max-height: 85vh; overflow-y: auto;
        }
        
        h3 { margin: 0 0 15px 0; color: #004085; font-size: 1.25em; border-bottom: 2px solid #007bff; padding-bottom: 8px; }
        
        .legend-section {
            background: #f8fbff; padding: 12px; border-radius: 8px;
            font-size: 0.85em; border: 1px solid #e1e9f4; margin-bottom: 15px;
        }

        .section-title { font-weight: 600; color: #004085; margin-bottom: 10px; font-size: 0.9em; text-transform: uppercase; letter-spacing: 0.5px; }

        .legend-item {
            display: flex; align-items: center; margin-bottom: 8px;
            cursor: pointer; color: #2c3e50; font-weight: 500;
        }
        .legend-item input { margin-right: 12px; cursor: pointer; }
        
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; border: 1px solid #333; }
        .hosp-icon { vertical-align: middle; margin-right: 8px; }

        .nav-btn {
            display: inline-block; width: 100%; padding: 10px; margin-top: 5px;
            background-color: #6c757d; color: white;
            text-align: center; text-decoration: none; font-weight: 600;
            border-radius: 6px; transition: all 0.2s ease; border: none;
            cursor: pointer; font-size: 0.9rem;
        }
        .nav-btn:hover { background-color: #5a6268; transform: translateY(-1px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="panel">
        <h3>Uttar Pradesh Risk Map</h3>
        
        <div class="legend-section">
            <div class="section-title">Flood Events</div>
            <label class="legend-item"><input type="checkbox" checked onchange="toggleLayer('flood1', this)"> <span class="dot" style="background-color: #7fbfff;"></span> Sev 1.0</label>
            <label class="legend-item"><input type="checkbox" checked onchange="toggleLayer('flood1_5', this)"> <span class="dot" style="background-color: #ff8c00;"></span> Sev 1.5</label>
            <label class="legend-item"><input type="checkbox" checked onchange="toggleLayer('flood2', this)"> <span class="dot" style="background-color: #ff0000;"></span> Sev 2.0</label>
        </div>

        <div class="legend-section">
            <div class="section-title">Health Facilities</div>
            <label class="legend-item"><input type="checkbox" checked onchange="toggleLayer('all-hosp', this)"> <svg width="12" height="12" class="hosp-icon"><circle cx="6" cy="6" r="6" fill="#87CEEB"/><path d="M6 3V9M3 6H9" stroke="white" stroke-width="2"/></svg> All Hospitals</label>
            <label class="legend-item"><input type="checkbox" checked onchange="toggleLayer('risk-5', this)"> <svg width="14" height="14" class="hosp-icon"><circle cx="7" cy="7" r="7" fill="#FFCCCB"/><path d="M7 4V10M4 7H10" stroke="white" stroke-width="2"/></svg> 5km Risk (High)</label>
            <label class="legend-item"><input type="checkbox" checked onchange="toggleLayer('risk-10', this)"> <svg width="14" height="14" class="hosp-icon"><circle cx="7" cy="7" r="7" fill="#FFDEAD"/><path d="M7 4V10M4 7H10" stroke="white" stroke-width="2"/></svg> 10km Risk</label>
        </div>
        
        <a href="../flood_map_India.html" class="nav-btn">← Back to India Map</a>
    </div>

    <div id="map"></div>
    <script src="../day2/india_points.js"></script>
    <script src="../day3/hospital_data_UP.js"></script>
    <script src="../day3/hospitals_at_risk_UP.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false }).setView([26.8467, 82.0], 7);
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap, © CARTO'
        }).addTo(map);

        const layers = {
            'flood1': L.layerGroup().addTo(map),
            'flood1_5': L.layerGroup().addTo(map),
            'flood2': L.layerGroup().addTo(map),
            'all-hosp': L.layerGroup().addTo(map),
            'risk-5': L.layerGroup().addTo(map),
            'risk-10': L.layerGroup().addTo(map)
        };

        // Flood Points
        if (typeof indiaData !== 'undefined') {
            indiaData.forEach(p => {
                const sev = p.severity;
                let color, radius, target;
                if (sev === 1 || String(sev) === '1.0') { color='#7fbfff'; radius=5; target=layers.flood1; }
                else if (sev === 1.5 || String(sev) === '1.5') { color='#ff8c00'; radius=8; target=layers.flood1_5; }
                else if (sev === 2 || String(sev) === '2.0') { color='#ff0000'; radius=12; target=layers.flood2; }
                else { color='#007bff'; radius=5; target=layers.flood1; }

                L.circleMarker([p.lat, p.lng], { radius, fillColor:color, color:"#004085", weight:1, fillOpacity:0.7 })
                .bindPopup(`<b>Flood Event</b><br>Date: ${p.began || 'N/A'}<br>Severity: ${sev}`).addTo(target);
            });
        }

        // Hospitals
        const baseIcon = L.divIcon({
            html: `<svg width="12" height="12" viewBox="0 0 24 24"><circle cx="12" cy="12" r="12" fill="#87CEEB"/><path d="M12 6V18M6 12H18" stroke="white" stroke-width="4"/></svg>`,
            className: 'h-sm', iconSize: [12, 12], iconAnchor: [6, 6]
        });
        if (typeof hospitalDataUP !== 'undefined') {
            hospitalDataUP.forEach(h => {
                L.marker([h.lat, h.lng], { icon: baseIcon }).bindPopup(`<b>${h.name}</b><br>${h.city}`).addTo(layers['all-hosp']);
            });
        }

        // Risk Hospitals
        const createRiskIcon = (bg) => L.divIcon({
            html: `<svg width="20" height="20" viewBox="0 0 24 24"><circle cx="12" cy="12" r="12" fill="${bg}"/><path d="M12 6V18M6 12H18" stroke="white" stroke-width="4"/></svg>`,
            className: 'h-risk', iconSize: [20, 20], iconAnchor: [10, 10]
        });

        if (typeof hospitalsAtRiskUP !== 'undefined') {
            hospitalsAtRiskUP.radius_5km.forEach(h => {
                L.marker([h.lat, h.lng], { icon: createRiskIcon('#FFCCCB') }).bindPopup(`<b>HIGH RISK: ${h.name}</b>`).addTo(layers['risk-5']);
            });
            hospitalsAtRiskUP.radius_10km.forEach(h => {
                L.marker([h.lat, h.lng], { icon: createRiskIcon('#FFDEAD') }).bindPopup(`<b>AT RISK: ${h.name}</b>`).addTo(layers['risk-10']);
            });
        }

        function toggleLayer(type, checkbox) {
            if (checkbox.checked) map.addLayer(layers[type]);
            else map.removeLayer(layers[type]);
        }
    </script>
</body>
</html>

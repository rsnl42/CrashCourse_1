<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historical Floods in India</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { height: 100%; margin: 0; background: #f0f4f8; }
        #map { height: 100%; width: 100%; }
        
        .panel {
            position: absolute; top: 20px; right: 20px; z-index: 1000;
            background: rgba(255, 255, 255, 0.98); padding: 20px; border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 40, 133, 0.15); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            width: 280px; border: 1px solid #d1e3f8;
            max-height: 85vh; overflow-y: auto;
        }
        
        h3 { margin: 0 0 15px 0; color: #004085; font-size: 1.25em; border-bottom: 2px solid #007bff; padding-bottom: 8px; }
        
        .legend-content {
            background: #f8fbff; padding: 12px; border-radius: 8px;
            font-size: 0.85em; border: 1px solid #e1e9f4; margin-bottom: 15px;
        }

        .section-title { font-weight: 600; color: #004085; margin-bottom: 10px; font-size: 0.9em; text-transform: uppercase; letter-spacing: 0.5px; }

        .legend-item {
            display: flex; align-items: center; margin-bottom: 8px;
            cursor: pointer; color: #2c3e50; font-weight: 500;
        }
        .legend-item input { margin-right: 12px; cursor: pointer; }
        
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; border: 1px solid #333; }

        .nav-btn {
            display: inline-block; width: 100%; padding: 8px 15px; margin-top: 10px;
            background-color: #ffffff; color: #007bff;
            text-align: center; text-decoration: none; font-weight: 600;
            border-radius: 6px; transition: all 0.2s ease; border: 1px solid #b3cde3;
            cursor: pointer; font-size: 0.85em;
        }
        .nav-btn:hover { 
            background-color: #e6f2ff; 
            transform: translateY(-1px); 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .nav-const { transform: translateY(0); }
        
        .nav-btn.secondary {
            background-color: #ced4da; color: #333;
            border-color: #adb5bd;
        }
        .nav-btn.secondary:hover { 
            background-color: #adb5bd; 
        }
    </style>
</head>
<body>
    <div class="panel">
        <h3>India Flood History</h3>
        
        <div class="legend-content">
            <div class="section-title">Toggle Severity</div>
            <label class="legend-item">
                <input type="checkbox" checked onchange="toggleLayer('sev1', this)">
                <span class="dot" style="background-color: #7fbfff;"></span> Severity 1.0
            </label>
            <label class="legend-item">
                <input type="checkbox" checked onchange="toggleLayer('sev1_5', this)">
                <span class="dot" style="background-color: #ff8c00;"></span> Severity 1.5
            </label>
            <label class="legend-item">
                <input type="checkbox" checked onchange="toggleLayer('sev2', this)">
                <span class="dot" style="background-color: #ff0000;"></span> Severity 2.0
            </label>
        </div>
        
        <a href="day4/flood_risk_map_UP.html" class="nav-btn">Drill Down to Uttar Pradesh →</a>
        <a href="flood_map.html" class="nav-btn secondary">← Back to Global Map</a>
    </div>

    <div id="map"></div>
    <script src="day2/india_points.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false }).setView([22.5, 78.9], 5); 
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap, © CARTO'
        }).addTo(map);

        const layers = {
            'sev1': L.layerGroup().addTo(map),
            'sev1_5': L.layerGroup().addTo(map),
            'sev2': L.layerGroup().addTo(map)
        };

        indiaData.forEach(p => {
            const sev = p.severity;
            let fillColor, radius, targetLayer;
            
            if (sev === 1 || String(sev) === '1.0') {
                fillColor = '#7fbfff'; radius = 5; targetLayer = layers.sev1;
            } else if (sev === 1.5 || String(sev) === '1.5') {
                fillColor = '#ff8c00'; radius = 8; targetLayer = layers.sev1_5;
            } else if (sev === 2 || String(sev) === '2.0') {
                fillColor = '#ff0000'; radius = 12; targetLayer = layers.sev2;
            } else {
                fillColor = '#007bff'; radius = 5; targetLayer = layers.sev1;
            }

            const locationHtml = (sev === 2 || String(sev) === '2.0') ? `<b>Location:</b> ${p.Place || 'N/A'}<br>` : '';

            L.circleMarker([p.lat, p.lng], {
                radius: radius, fillColor: fillColor, color: "#004085", weight: 1, opacity: 0.8, fillOpacity: 0.7
            }).bindPopup(`
                <div style="font-family: sans-serif;">
                    <b style="color:#d32f2f">Flood Event</b><br>
                    ${locationHtml}
                    <b>Date:</b> ${p.began || p.date || 'N/A'}<br>
                    <b>Cause:</b> ${p.cause || 'N/A'}<br>
                    <b>Severity:</b> ${p.severity || 'N/A'}
                </div>
            `).addTo(targetLayer);
        });

        function toggleLayer(key, checkbox) {
            if (checkbox.checked) map.addLayer(layers[key]);
            else map.removeLayer(layers[key]);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historical Floods in India</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { height: 100%; margin: 0; background: #f0f4f8; }
        #map { height: 100%; width: 100%; }
        .panel {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: white; padding: 15px; border-radius: 8px;
            box-shadow: 0 4px 12px rgba(0, 64, 128, 0.2); font-family: sans-serif; 
            width: 250px; border-left: 5px solid #007bff;
        }
        h2 { margin: 0 0 5px 0; color: #004085; font-size: 1.2em; }
        p { margin: 5px 0; font-size: 0.9em; color: #555; }
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; }
        .dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; border: 1px solid #333; }
    </style>
</head>
<body>
    <div class="panel">
        <h2>India Flood History</h2>
        <p>Showing historical flood events recorded in India, categorized by severity level (1.0 to 2.0).</p>
        <div class="legend-item"><span class="dot" style="background-color: #7fbfff;"></span> Severity 1.0</div>
        <div class="legend-item"><span class="dot" style="background-color: #ff8c00;"></span> Severity 1.5</div>
        <div class="legend-item"><span class="dot" style="background-color: #ff0000;"></span> Severity 2.0</div>
    </div>
    <div id="map"></div>
    <script src="Day 2 Flood mapping/india_points.js"></script>
    <script>
        const map = L.map('map').setView([22.5, 78.9], 5); 
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap, © CARTO'
        }).addTo(map);

        // Flood Layers (by Severity)
        const floodLayer1 = L.layerGroup().addTo(map);
        const floodLayer1_5 = L.layerGroup().addTo(map);
        const floodLayer2 = L.layerGroup().addTo(map);

        indiaData.forEach(p => {
            const sev = p.severity;
            let fillColor, radius, targetLayer;
            
            if (sev === 1 || String(sev) === '1.0') {
                fillColor = '#7fbfff';
                radius = 5;
                targetLayer = floodLayer1;
            } else if (sev === 1.5 || String(sev) === '1.5') {
                fillColor = '#ff8c00';
                radius = 8; 
                targetLayer = floodLayer1_5;
            } else if (sev === 2 || String(sev) === '2.0') {
                fillColor = '#ff0000';
                radius = 12;  
                targetLayer = floodLayer2;
            } else {
                fillColor = '#007bff';
                radius = 5;
                targetLayer = floodLayer1;
            }

            L.circleMarker([p.lat, p.lng], {
                radius: radius,
                fillColor: fillColor,
                color: "#004085",
                weight: 1,
                opacity: 0.8,
                fillOpacity: 0.7
            }).bindPopup(`
                <div style="font-family: sans-serif;">
                    <b style="color:#d32f2f">Flood Event</b><br>
                    <b>Location:</b> ${p.Place || 'N/A'}<br>
                    <b>Date:</b> ${p.began || p.date || 'N/A'}<br>
                    <b>Cause:</b> ${p.cause || 'N/A'}<br>
                    <b>Severity:</b> ${p.severity || 'N/A'}
                </div>
            `).addTo(targetLayer);
        });

        const overlayMaps = {
            "Severity 1.0": floodLayer1,
            "Severity 1.5": floodLayer1_5,
            "Severity 2.0": floodLayer2
        };

        L.control.layers(null, overlayMaps, { collapsed: false }).addTo(map);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historical Flood Map (Dynamic)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        body, html { height: 100%; margin: 0; }
        #map { height: 100%; width: 100%; }
        .control-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            width: 280px;
        }
        select {
            width: 100%;
            padding: 8px;
            margin-top: 10px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        h3 { margin-top: 0; color: #0056b3; }
        .legend { line-height: 18px; color: #555; }
        .legend i { width: 18px; height: 18px; float: left; margin-right: 8px; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="control-panel">
        <h3>Historical Flood Data</h3>
        <label for="category">Select Metric:</label>
        <select id="category" onchange="updateMarkers()">
            <option value="cases">Total Cases</option>
            <option value="dead">Total Dead</option>
            <option value="displaced">Total Displaced</option>
        </select>
        <hr>
        <div id="stats-info" style="font-size: 0.9em; color: #666;">
            Select a metric to see proportional impact globally.
        </div>
    </div>
    <div id="map"></div>

    <script src="Day 2 Flood mapping/map_data.js"></script>
    <script>
        // Initialize the map
        const map = L.map('map').setView([20, 0], 2);

        // Add base layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let markers = [];

        function getRadius(value, category) {
            if (value <= 0) return 0;
            
            // Scaling logic based on category ranges
            if (category === 'cases') {
                return Math.sqrt(value) * 2; // Linearish scaling for small numbers
            } else if (category === 'dead') {
                return Math.log10(value + 1) * 6; // Logarithmic scaling for high variance
            } else if (category === 'displaced') {
                return Math.log10(value + 1) * 4; // Logarithmic scaling for very large numbers
            }
            return 5;
        }

        function getLabel(category) {
            const labels = {
                'cases': 'Total Flood Cases',
                'dead': 'Total Fatalities',
                'displaced': 'Total Displaced People'
            };
            return labels[category];
        }

        function updateMarkers() {
            const category = document.getElementById('category').value;
            
            // Clear existing markers
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            // Add new circle markers
            floodData.forEach(country => {
                const value = country[category];
                if (value > 0) {
                    const radius = getRadius(value, category);
                    const marker = L.circleMarker([country.lat, country.lng], {
                        radius: radius,
                        fillColor: "#007bff",
                        color: "#004085",
                        weight: 1,
                        opacity: 1,
                        fillOpacity: 0.6
                    }).addTo(map);

                    marker.bindPopup(`
                        <div style="font-family: sans-serif;">
                            <strong>${country.name}</strong><br>
                            <hr style="margin: 5px 0;">
                            ${getLabel(category)}: <strong>${value.toLocaleString()}</strong>
                        </div>
                    `);
                    
                    markers.push(marker);
                }
            });

            document.getElementById('stats-info').innerHTML = `Currently showing <strong>${getLabel(category).toLowerCase()}</strong>. Sizes are scaled to highlight impact areas.`;
        }

        // Initial run
        updateMarkers();
    </script>
</body>
</html>

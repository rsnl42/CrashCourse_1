<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Map - Uttar Pradesh</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { height: 100%; margin: 0; background: #f0f4f8; }
        #map { height: 100%; width: 100%; }
        .panel {
            position: absolute; top: 10px; right: 10px; z-index: 1000;
            background: white; padding: 15px; border-radius: 8px;
            box-shadow: 0 4px 12px rgba(0, 64, 128, 0.2); font-family: sans-serif; 
            width: 250px; border-left: 5px solid #007bff;
        }
        h2 { margin: 0 0 5px 0; color: #004085; font-size: 1.2em; }
        p { margin: 5px 0; font-size: 0.9em; color: #555; }
    </style>
</head>
<body>
    <div class="panel">
        <h2>Interactive Map</h2>
        <p>Map showing flood events and at-risk hospital locations.</p>
        <p><strong>Markers:</strong></p>
        <ul>
            <li><i style="background:#7fbfff;width:10px;height:10px;display:inline-block;margin:0 4px;border:1px solid #004085;border-radius:50%"></i> Severity 1.0 Flood</li>
            <li><i style="background:#ff8c00;width:15px;height:15px;display:inline-block;margin:0 4px;border:1px solid #004085;border-radius:50%;vertical-align:middle"></i> Severity 1.5 Flood</li>
            <li><i style="background:#ff0000;width:20px;height:20px;display:inline-block;margin:0 4px;border:1px solid #004085;border-radius:50%;vertical-align:middle"></i> Severity 2.0 Flood</li>
            <li><svg width="12" height="12" style="vertical-align:middle; margin:0 2px"><path d="M6 3V9M3 6H9" stroke="#007bff" stroke-width="2" stroke-linecap="round"/></svg> All Hospitals</li>
            <li><svg width="18" height="18" style="vertical-align:middle; margin:0 2px"><path d="M9 4.5V13.5M4.5 9H13.5" stroke="#ff8c00" stroke-width="3" stroke-linecap="round"/></svg> 10km Risk Hospital</li>
            <li><svg width="24" height="24" style="vertical-align:middle; margin:0 2px"><path d="M12 3V21M3 12H21" stroke="#ff0000" stroke-width="4" stroke-linecap="round"/></svg> 5km Risk Hospital</li>
        </ul>
    </div>
    <div id="map"></div>
    <script src="Day 2 Flood mapping/india_points.js"></script>
    <script src="Day 3 at-risk Hospitals mapping (UP)/hospital_data_UP.js"></script>
    <script src="Day 3 at-risk Hospitals mapping (UP)/hospitals_at_risk_UP.js"></script>
    <script>
        const map = L.map('map').setView([26.8467, 82.0], 7); // Focused on Eastern UP
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap, © CARTO'
        }).addTo(map);

        // Flood Layers
        const floodLayer1 = L.layerGroup();
        const floodLayer1_5 = L.layerGroup();
        const floodLayer2 = L.layerGroup();

        // Check if indiaData is available before iterating
        if (typeof indiaData !== 'undefined' && Array.isArray(indiaData)) {
            indiaData.forEach(p => {
                const sev = p.severity;
                let fillColor, radius, targetLayer;
                if (sev === 1 || String(sev) === '1.0') {
                    fillColor = '#7fbfff'; radius = 5; targetLayer = floodLayer1;
                } else if (sev === 1.5 || String(sev) === '1.5') {
                    fillColor = '#ff8c00'; radius = 7.5; targetLayer = floodLayer1_5;
                } else if (sev === 2 || String(sev) === '2.0') {
                    fillColor = '#ff0000'; radius = 10; targetLayer = floodLayer2;
                } else {
                    fillColor = '#007bff'; radius = 5; targetLayer = floodLayer1;
                }
                L.circleMarker([p.lat, p.lng], { radius: radius, fillColor: fillColor, color: "#004085", weight: 1, opacity: 0.8, fillOpacity: 0.8 }).bindPopup(`
                    <div style="font-family: sans-serif;">
                        <b style="color:#d32f2f">Flood Event</b><br>
                        <b>Date:</b> ${p.began || p.date || 'N/A'}<br>
                        <b>Cause:</b> ${p.cause || 'N/A'}<br>
                        <b>Severity:</b> ${p.severity || 'N/A'}
                    </div>
                `).addTo(targetLayer);
            });
            floodLayer1.addTo(map);
            floodLayer1_5.addTo(map);
            floodLayer2.addTo(map);
        }

        // Hospital Layer (All)
        const hospitalLayer = L.layerGroup();
        const baseHospitalIcon = L.divIcon({
            html: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                       <circle cx="12" cy="12" r="12" fill="#87CEEB"/> {/* Light Blue background */}
                       <path d="M12 6V18M6 12H18" stroke="white" stroke-width="4" stroke-linecap="round"/> {/* White plus */}
                   </svg>`,
            className: 'hospital-marker-small',
            iconSize: [12, 12],
            iconAnchor: [6, 6],
            popupAnchor: [0, -6]
        });

        // Check if hospitalDataUP is available before iterating
        if (typeof hospitalDataUP !== 'undefined' && Array.isArray(hospitalDataUP)) {
            hospitalDataUP.forEach(h => {
                L.marker([h.lat, h.lng], { icon: baseHospitalIcon }).bindPopup(`<b>${h.name}</b><br>${h.city}`).addTo(hospitalLayer);
            });
            hospitalLayer.addTo(map);
        }

        // At-Risk Layers
        const risk5kmLayer = L.layerGroup();
        const risk10kmLayer = L.layerGroup();

        const createPlusIcon = (plusColor, backgroundColor, size, strokeWidth) => L.divIcon({
            html: `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                       <circle cx="12" cy="12" r="12" fill="${backgroundColor}"/> {/* Background */}
                       <path d="M12 6V18M6 12H18" stroke="${plusColor}" stroke-width="${strokeWidth}" stroke-linecap="round"/> {/* Plus sign */}
                   </svg>`,
            className: 'risk-marker',
            iconSize: [size, size],
            iconAnchor: [size/2, size/2]
        });

        // Check if hospitalsAtRiskUP is available and has radius_5km
        if (typeof hospitalsAtRiskUP !== 'undefined' && hospitalsAtRiskUP.radius_5km) {
            hospitalsAtRiskUP.radius_5km.forEach(h => {
                L.marker([h.lat, h.lng], { icon: createPlusIcon('white', '#FFCCCB', 24, 4) }) // Red plus on light red background
                .bindPopup(`
                    <div style="font-family: sans-serif;">
                        <b style="color:#ff0000">⚠️ HIGH RISK HOSPITAL (5km)</b><br>
                        <b>Name:</b> ${h.name}<br>
                        <b>Distance:</b> ${h.distance_km} km to nearest flood<br>
                        <b>Flood Cause:</b> ${h.flood_cause}
                    </div>
                `).addTo(risk5kmLayer);
            });
            risk5kmLayer.addTo(map);
        }

        // Check if hospitalsAtRiskUP is available and has radius_10km
        if (typeof hospitalsAtRiskUP !== 'undefined' && hospitalsAtRiskUP.radius_10km) {
            hospitalsAtRiskUP.radius_10km.forEach(h => {
                L.marker([h.lat, h.lng], { icon: createPlusIcon('white', '#FFDEAD', 18, 3) }) // Orange plus on light orange background
                .bindPopup(`
                    <div style="font-family: sans-serif;">
                        <b style="color:#ff8c00">⚠️ AT RISK HOSPITAL (10km)</b><br>
                        <b>Name:</b> ${h.name}<br>
                        <b>Distance:</b> ${h.distance_km} km to nearest flood<br>
                        <b>Flood Cause:</b> ${h.flood_cause}
                    </div>
                `).addTo(risk10kmLayer);
            });
            risk10kmLayer.addTo(map);
        }

        // Layer Control + Legend
        const combinedControl = L.control({position: 'bottomleft'});
        combinedControl.onAdd = function (map) {
            const div = L.DomUtil.create('div', 'combined-control');
            div.style.background = 'white';
            div.style.padding = '12px';
            div.style.borderRadius = '8px';
            div.style.boxShadow = '0 4px 12px rgba(0,0,0,0.15)';
            div.style.fontFamily = 'sans-serif';
            div.style.fontSize = '0.9em';
            div.style.width = '240px';
            div.style.borderLeft = '6px solid #007bff';

            div.innerHTML = `
                <div style="font-weight:bold; margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px; color:#004085">Map Layers</div>
                
                <div style="margin-bottom:12px">
                    <div style="font-weight:600; margin-bottom:5px; font-size:0.85em; color:#666">FLOOD EVENTS</div>
                    <label style="display:block; margin-bottom:3px; cursor:pointer"><input type="checkbox" checked onchange="toggleLayer('flood1', this)"> <i style="background:#7fbfff;width:10px;height:10px;display:inline-block;margin:0 4px;border:1px solid #004085;border-radius:50%"></i> Severity 1.0</label>
                    <label style="display:block; margin-bottom:3px; cursor:pointer"><input type="checkbox" checked onchange="toggleLayer('flood1_5', this)"> <i style="background:#ff8c00;width:15px;height:15px;display:inline-block;margin:0 4px;border:1px solid #004085;border-radius:50%;vertical-align:middle"></i> Severity 1.5 (1.5x)</label>
                    <label style="display:block; margin-bottom:5px; cursor:pointer"><input type="checkbox" checked onchange="toggleLayer('flood2', this)"> <i style="background:#ff0000;width:20px;height:20px;display:inline-block;margin:0 4px;border:1px solid #004085;border-radius:50%;vertical-align:middle"></i> Severity 2.0 (2x)</label>
                </div>

                <div>
                    <div style="font-weight:600; margin-bottom:5px; font-size:0.85em; color:#666">HOSPITALS</div>
                    <label style="display:block; margin-bottom:5px; cursor:pointer"><input type="checkbox" checked onchange="toggleLayer('all-hosp', this)"> <svg width="12" height="12" style="vertical-align:middle; margin:0 2px"><circle cx="6" cy="6" r="6" fill="#87CEEB"/><path d="M6 3V9M3 6H9" stroke="white" stroke-width="4" stroke-linecap="round"/></svg> All Hospitals</label>
                    <label style="display:block; margin-bottom:5px; cursor:pointer; color:#d32f2f; font-weight:600"><input type="checkbox" checked onchange="toggleLayer('risk-5', this)"> <svg width="24" height="24" style="vertical-align:middle; margin:0 2px"><circle cx="12" cy="12" r="12" fill="white"/><path d="M12 6V18M6 12H18" stroke="red" stroke-width="4" stroke-linecap="round"/></svg> 5km (High Risk)</label>
                    <label style="display:block; margin-bottom:5px; cursor:pointer; color:#e67e22; font-weight:600"><input type="checkbox" checked onchange="toggleLayer('risk-10', this)"> <svg width="18" height="18" style="vertical-align:middle; margin:0 2px"><circle cx="12" cy="12" r="12" fill="white"/><path d="M12 6V18M6 12H18" stroke="orange" stroke-width="3" stroke-linecap="round"/></svg> 10km (At Risk)</label>
                </div>
            `;

            L.DomEvent.disableClickPropagation(div);
            return div;
        };
        combinedControl.addTo(map);

        function toggleLayer(type, checkbox) {
            const layers = {
                'flood1': floodLayer1, 'flood1_5': floodLayer1_5, 'flood2': floodLayer2,
                'all-hosp': hospitalLayer, 'risk-5': risk5kmLayer, 'risk-10': risk10kmLayer
            };
            
            const layer = layers[type];
            if (layer) { // Check if layer exists
                if (checkbox.checked) {
                    map.addLayer(layer);
                } else {
                    map.removeLayer(layer);
                }
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood Events Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="dashboard_data.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card h3 {
            margin-top: 0;
            color: #333;
        }
        canvas {
            width: 100% !important;
            height: 300px !important;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            color: #777;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<header>
    <h1>Global Flood Archive Dashboard</h1>
    <p>Visualizing historical flood data from 1985 to present</p>
</header>

<div class="dashboard-grid">
    <!-- Card 1: Events by Country -->
    <div class="card">
        <h3>Top 20 Countries by Flood Events</h3>
        <canvas id="countryChart"></canvas>
    </div>

    <!-- Card 2: Events per Year -->
    <div class="card">
        <h3>Flood Events per Year</h3>
        <canvas id="yearChart"></canvas>
    </div>

    <!-- Card 3: Events by Category -->
    <div class="card">
        <h3>Flood Events by Category</h3>
        <canvas id="categoryChart"></canvas>
    </div>

    <!-- Card 4: Total Displaced by Severity -->
    <div class="card">
        <h3>Total Displaced by Severity</h3>
        <canvas id="severityChart"></canvas>
    </div>
</div>

<footer>
    <p>Data Source: FloodArchive Cleaned CSV | Created with Chart.js</p>
</footer>

<script>
    // Viridis Color Palette Helper
    const viridisColors = [
        '#440154', '#481567', '#482677', '#453781', '#404788', 
        '#39568c', '#33638d', '#2d708e', '#287d8e', '#238a8d', 
        '#1f968b', '#20a387', '#29af7f', '#3cbc75', '#55c667', 
        '#73d055', '#95d840', '#b8de29', '#dce319', '#fde725'
    ];

    function getViridisScale(count) {
        if (count <= 1) return [viridisColors[0]];
        const scale = [];
        for (let i = 0; i < count; i++) {
            const index = Math.floor(i * (viridisColors.length - 1) / (count - 1));
            scale.push(viridisColors[index]);
        }
        return scale;
    }

    // 1. Events by Country
    const countryLabels = Object.keys(dashboardData.events_by_country);
    new Chart(document.getElementById('countryChart'), {
        type: 'bar',
        data: {
            labels: countryLabels,
            datasets: [{
                label: '# of Events',
                data: Object.values(dashboardData.events_by_country),
                backgroundColor: getViridisScale(countryLabels.length),
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true } }
        }
    });

    // 2. Events per Year
    new Chart(document.getElementById('yearChart'), {
        type: 'line',
        data: {
            labels: Object.keys(dashboardData.events_by_year),
            datasets: [{
                label: 'Events per Year',
                data: Object.values(dashboardData.events_by_year),
                fill: true,
                backgroundColor: 'rgba(33, 145, 140, 0.2)', // Viridis Teal-ish with transparency
                borderColor: '#21918c',
                tension: 0.1,
                pointBackgroundColor: '#440154'
            }]
        },
        options: {
            responsive: true,
            scales: { y: { beginAtZero: true } }
        }
    });

    // 3. Events by Category
    const categoryLabels = Object.keys(dashboardData.events_by_category);
    new Chart(document.getElementById('categoryChart'), {
        type: 'bar',
        data: {
            labels: categoryLabels,
            datasets: [{
                label: '# of Events',
                data: Object.values(dashboardData.events_by_category),
                backgroundColor: getViridisScale(categoryLabels.length),
                borderWidth: 0
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            plugins: { legend: { display: false } }
        }
    });

    // 4. Total Displaced by Severity
    const severityLabels = Object.keys(dashboardData.displaced_by_severity);
    new Chart(document.getElementById('severityChart'), {
        type: 'bar',
        data: {
            labels: severityLabels,
            datasets: [{
                label: 'Total Displaced',
                data: Object.values(dashboardData.displaced_by_severity),
                backgroundColor: getViridisScale(severityLabels.length),
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            scales: { y: { beginAtZero: true } }
        }
    });
</script>

</body>
</html>

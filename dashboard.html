<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood Events Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="dashboard_data.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card h3 {
            margin-top: 0;
            color: #1a1a1a;
            font-weight: 600;
        }
        canvas {
            width: 100% !important;
            height: 300px !important;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<header>
    <h1>Global Flood Archive Dashboard</h1>
    <p>Visualizing historical flood data from 1985 to 2021</p>
</header>

<div class="dashboard-grid">
    <!-- Card 1: Events by Country -->
    <div class="card">
        <h3>Top 20 Countries by Flood Events</h3>
        <canvas id="countryChart"></canvas>
    </div>

    <!-- Card 2: Events per Year -->
    <div class="card">
        <h3>Flood Events per Year</h3>
        <canvas id="yearChart"></canvas>
    </div>

    <!-- Card 3: Events by Category -->
    <div class="card">
        <h3>Flood Events by Category</h3>
        <canvas id="categoryChart"></canvas>
    </div>

    <!-- Card 4: Total Displaced by Severity -->
    <div class="card">
        <h3>Total Displaced by Severity</h3>
        <canvas id="severityChart"></canvas>
    </div>
</div>

<footer>
    <p>Data Source: FloodArchive Cleaned CSV | Created with Chart.js</p>
</footer>

<script>
    // Vibrant Color Palette
    const vibrantColors = [
        '#FF007F', '#00E5FF', '#76FF03', '#FFAB00', '#D500F9', 
        '#2979FF', '#FF3D00', '#00E676', '#FFFF00', '#F50057',
        '#64FFDA', '#FF6E40', '#18FFFF', '#7C4DFF', '#EEFF41',
        '#B2FF59', '#FFD740', '#FF4081', '#40C4FF', '#00B8D4'
    ];

    function getVibrantScale(count) {
        const scale = [];
        for (let i = 0; i < count; i++) {
            scale.push(vibrantColors[i % vibrantColors.length]);
        }
        return scale;
    }

    // 1. Events by Country
    const countryLabels = Object.keys(dashboardData.events_by_country);
    new Chart(document.getElementById('countryChart'), {
        type: 'bar',
        data: {
            labels: countryLabels,
            datasets: [{
                label: '# of Events',
                data: Object.values(dashboardData.events_by_country),
                backgroundColor: getVibrantScale(countryLabels.length),
                borderWidth: 0,
                borderRadius: 4
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true } }
        }
    });

    // 2. Events per Year
    new Chart(document.getElementById('yearChart'), {
        type: 'line',
        data: {
            labels: Object.keys(dashboardData.events_by_year),
            datasets: [{
                label: 'Events per Year',
                data: Object.values(dashboardData.events_by_year),
                fill: true,
                backgroundColor: 'rgba(0, 229, 255, 0.2)', // Bright Cyan with transparency
                borderColor: '#00E5FF',
                borderWidth: 3,
                tension: 0.3,
                pointBackgroundColor: '#FF007F',
                pointRadius: 4
            }]
        },
        options: {
            responsive: true,
            scales: { y: { beginAtZero: true } }
        }
    });

    // 3. Events by Category
    const categoryLabels = Object.keys(dashboardData.events_by_category);
    new Chart(document.getElementById('categoryChart'), {
        type: 'bar',
        data: {
            labels: categoryLabels,
            datasets: [{
                label: '# of Events',
                data: Object.values(dashboardData.events_by_category),
                backgroundColor: getVibrantScale(categoryLabels.length),
                borderWidth: 0,
                borderRadius: 4
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            plugins: { legend: { display: false } }
        }
    });

    // 4. Total Displaced by Severity
    const severityLabels = Object.keys(dashboardData.displaced_by_severity);
    new Chart(document.getElementById('severityChart'), {
        type: 'bar',
        data: {
            labels: severityLabels,
            datasets: [{
                label: 'Total Displaced',
                data: Object.values(dashboardData.displaced_by_severity),
                backgroundColor: ['#76FF03', '#FFAB00', '#FF3D00'], // Bright Lime, Amber, Deep Red
                borderWidth: 0,
                borderRadius: 8
            }]
        },
        options: {
            responsive: true,
            scales: { y: { beginAtZero: true } }
        }
    });
</script>

</body>
</html>
